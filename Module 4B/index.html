<!DOCTYPE html>
<html>

<body>

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Module 4B</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>

    <main>
        <div class="container">
            <h1 id="heading">Student Grade Calculator</h1>
            <p class="para">Below is a calculator to determine your grade.</p>

            <button id="counter-btn">Increment Count</button>
            <span class="display-counter">0</span>

            <ol class="tasks"></ol>
            <button id="plus-task-btn">Add Task</button>

            <input type="text" id="search-bar" placeholder="Filter Tasks...">

            <button id="theme-btn">Dark Theme</button>
        </div>
    </main>
</body>

</html>
